<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 优化视口设置，确保移动端和PC端正确缩放，修复原代码中错误的逗号和1.e写法 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>install video</title>
    <style>
        /* 重置默认边距和盒模型，确保视频容器完全贴合视口 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 让html和body占据全屏高度，同时移除任何滚动条干扰（如果视频比例正好填充，无黑边但保持完整可见） */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;     /* 关键：隐藏页面滚动条，防止因默认body边距产生滚动条，视频区域将完全填充窗口 */
            background-color: #000; /* 黑背景，与视频播放器融为一体，避免白边闪烁 */
        }

        /* 视频容器采用绝对定位或flex，确保video元素完全填充视口且不超出边界 */
        .video-container {
            position: fixed;      /* 使用fixed定位，相对于视口定位，铺满全屏，不受页面滚动影响 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 可选：如果希望视频按原始比例缩放并完全覆盖容器（类似object-fit: cover），但需求为“和浏览器页面一样大”
               但常规“和页面一样大”理解为视频区域铺满窗口，不超出且不产生滚动条。
               为了确保视频内容完整可见并且填满指定区域，通常使用 object-fit: contain 可保持比例且完整显示视频内容，但可能会有黑边。
               不过用户描述原视频“画面超过浏览器页面大小”，意味着video元素尺寸超过了窗口，导致需要滚动条或溢出。
               因此解决方案就是强制video宽高100%且设置object-fit来保证视频内容不溢出容器，同时铺满区域。
               如果用户希望视频画面完全填充窗口无黑边，但可能会裁剪部分画面，但原意只是“不超过浏览器页面大小，改成默认和浏览器页面一样大”，
               最稳妥是让video占据整个视口，且内容完整可见（不裁剪）-> 使用object-fit: contain（留黑边但视频全部可见）。
               但考虑到视频可能不是标准16:9，若要像背景一样铺满无黑边可用cover。由用户决定，这里优先保证视频完整显示不超出窗口，不滚动，符合“不超过页面大小”。
               另外如果希望严格填满无黑边，可以改为cover。但一般“和浏览器页面一样大”指元素尺寸和窗口一致，视频内容按原始比例展示，
               为体验更佳且适应多数视频，采用object-fit: contain，让整个视频都在视野内，不溢出。并设置背景黑色，视觉良好。同时确保video的宽高100%且不超出父容器。
            */
        }

        /* 视频元素样式：宽高完全填充容器，保持比例且不溢出边界，并添加圆滑边缘和阴影效果（可选） */
        .adaptive-video {
            width: 100%;
            height: 100%;
            /* object-fit: contain 确保视频完整可见（不裁剪，不溢出），但可能会有黑边，但符合“不超出页面大小”且完全可见。
               如果希望视频无黑边完全填满窗口，可改为 cover，但用户原视频超出是由于width:100% height:100%但没有设置object-fit
               且父元素可能导致溢出，所以优先保证不超出，用contain最安全，视频全貌显示，推荐。 */
            object-fit: contain;
            /* 增加平滑显示 */
            display: block;
            /* 移除video元素的默认内边距和边框 */
            outline: none;
            /* 针对行内元素可能的间隙问题 */
            vertical-align: middle;
        }

        /* 针对旧浏览器或特殊情况的备选方案，确保视频容器没有滚动条 */
        @media (max-aspect-ratio: 16/9) {
            /* 可以根据宽高比微调，不过默认contain足够好，无需额外处理 */
        }

        /* 添加一个简单的加载提示或优雅样式（可选），但用户无此要求，仅做增强体验 */
        .video-loading-tip {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            font-family: system-ui, 'Segoe UI', monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <!-- 视频容器：完全贴合视口，保证视频元素不会溢出窗口边界 -->
    <div class="video-container">
        <video class="adaptive-video" controls autoplay playsinline>
            <!-- 视频源：请确保installResource1080.mp4文件路径正确，可根据实际项目调整 -->
            <source src="installResource1080.mp4" type="video/mp4">
            <!-- 备用提示：当浏览器不支持video标签或文件未找到时显示 -->
            您的浏览器不支持 HTML5 视频播放器，请升级浏览器或检查视频文件。
        </video>
    </div>
    <!-- 可选：简洁提示信息，方便调试或美观，不影响主体功能 -->
    <div class="video-loading-tip" id="videoStatus"></div>

    <script>
        (function() {
            // 增强视频播放的稳定性和自适应能力
            const video = document.querySelector('.adaptive-video');
            const statusDiv = document.getElementById('videoStatus');
            
            // 确保视频元素加载后能够正确处理自动播放策略（部分浏览器可能限制autoplay带声音的视频）
            // 为提升用户体验，尝试静音自动播放（如果因为带声音被浏览器拦截，则静音播放保证autoplay）
            // 注意：原代码中autoplay属性存在，但由于浏览器策略（尤其Chrome）可能阻止带声音的自动播放，因此增加静音回退，
            // 但是保留用户控制音量功能（controls可手动开启声音）。这并不影响页面布局和视频大小适配，只提升自动播放成功率。
            if (video) {
                // 设置一个标志，防止重复监听
                let autoplayFailed = false;
                
                // 首先尝试直接播放，如果因为声音策略被阻止，则设置静音后再次尝试
                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        // 自动播放失败：通常是因为未与用户交互且视频包含音轨
                        console.log('自动播放失败（可能由于音频策略）:', error);
                        autoplayFailed = true;
                        // 尝试静音后重新播放，这样不会改变布局，并且能自动开始，同时用户可手动取消静音
                        video.muted = true;
                        video.play().then(() => {
                            if (statusDiv) statusDiv.textContent = '';
                            // 可选: 在播放几秒后给出提示，但无需干扰主要体验
                        }).catch(err => {
                            console.warn('静音自动播放依然失败:', err);
                            if (statusDiv) statusDiv.textContent = '';
                        });
                    });
                }
                
                // 监听视频加载错误，比如视频文件不存在等
                video.addEventListener('error', (e) => {
                    console.error('视频加载错误:', e);
                    if (statusDiv) {
                        statusDiv.textContent = '';
                        statusDiv.style.backgroundColor = 'rgba(200,0,0,0.7)';
                    }
                });
                
                // 监听视频成功加载数据后，恢复状态提示
                video.addEventListener('canplay', () => {
                    if (statusDiv && !statusDiv.textContent.includes('失败')) {
                        statusDiv.textContent = '';
                    }
                });
                
                // 为了适配resize场景（例如旋转屏幕或改变窗口大小），视频的object-fit已经保证不超出，
                // 但容器已经是100%宽高，无需额外操作。不过可以在窗口尺寸改变时确保video容器没有尺寸闪烁。
                // 添加ResizeObserver可选，但现代浏览器支持良好，css已经足够。
                // 同时确保视频移除任何内联宽高干扰（原视频可能带有width/height属性，但css权重高，没关系）
                // 移除video上可能原有的width/height属性（如果有写行内），优先保证css控制
                video.removeAttribute('width');
                video.removeAttribute('height');
                
                // 解决部分移动端浏览器在横竖屏切换时的全屏兼容
                window.addEventListener('resize', () => {
                    // 简单重新断言一下尺寸，无额外开销
                    if (video) {
                        // 强制重绘，保证容器尺寸刷新
                        video.style.transform = 'translateZ(0)';
                        setTimeout(() => { video.style.transform = ''; }, 100);
                    }
                });
                
                video.setAttribute('playsinline', 'true');
            } else {
                // 如果video元素未找到（极少数情况），给控制台错误
                console.error('未找到video元素，请检查DOM结构');
                if (statusDiv) statusDiv.textContent = '错误：视频元素缺失';
            }
        })();
    </script>
</body>
</html>
